<!DOCTYPE html>
<html lang="en">
<head>
<script src="theme.js"></script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PolitQ — Login</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--border:#2a2a2a;--text:#e8e8e8;--text2:#888;--red-hi:#ef5350}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;display:flex;align-items:center;justify-content:center}
.box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:32px;width:360px;max-width:96vw}
.logo{font-size:26px;font-weight:900;letter-spacing:-1px;margin-bottom:4px}
.logo span{color:var(--text2)}
.sub{font-size:13px;color:var(--text2);margin-bottom:22px}
.tabs{display:flex;margin-bottom:18px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.tab{flex:1;padding:9px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600}
.tab.active{background:var(--bg3);color:var(--text)}
.inp{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;outline:none;margin-bottom:10px;font-family:inherit}
.inp:focus{border-color:#444}
.btn{width:100%;padding:11px;background:var(--text);color:var(--bg);border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.btn:hover{opacity:.85}.btn:disabled{opacity:.4;cursor:default}
.err{color:var(--red-hi);font-size:12px;margin-bottom:10px;padding:8px;background:rgba(239,83,80,.1);border-radius:6px;border:1px solid #5a2a2a}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;max-height:130px;overflow-y:auto}
.tag-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.tag{padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;border:1px solid transparent;display:inline-block;cursor:pointer}
.tag.sel{outline:2px solid #fff;outline-offset:1px}
.tag-authleft{background:#3a1010;color:#f08080;border-color:#6a2020}
.tag-authright{background:#10103a;color:#9090f0;border-color:#20206a}
.tag-libleft{background:#0f2a10;color:#70c070;border-color:#205a20}
.tag-libright{background:#2a2000;color:#c8a820;border-color:#5a4800}
</style>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
<div class="box">
  <div class="logo">Polit<span>Q</span></div>
  <div class="sub">The political debate platform</div>
  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="switchMode('login')">Log in</button>
    <button class="tab" id="tabSignup" onclick="switchMode('signup')">Sign up</button>
  </div>
  <div id="err"></div>
  <div id="form"></div>
</div>
<script type="module">
import { getDb, ref, get, set, update, getSession, setSession, ADMIN_USER, ADMIN_PASS, ALL_TAGS, tagClass, hashPassword, verifyPassword } from './shared.js';
const db = getDb();
if(getSession()) window.location.href='feed.html';

let mode='login', regTags=[];

function tagHtml(tag, sel){
  const k=tagClass(tag);
  return '<span class="tag tag-' + k + (sel?' sel':'') + '" onclick="toggleTag(\'' + tag.replace(/'/g,"&apos;") + '\')">' + tag + '</span>';
}
window.toggleTag = function(tag){
  const i=regTags.indexOf(tag);
  if(i===-1) regTags.push(tag); else regTags.splice(i,1);
  document.getElementById('regTagsRow').innerHTML = ALL_TAGS.map(t=>tagHtml(t,regTags.includes(t))).join('');
};
window.switchMode = function(m){
  mode=m; regTags=[];
  document.getElementById('tabLogin').classList.toggle('active',m==='login');
  document.getElementById('tabSignup').classList.toggle('active',m==='signup');
  renderForm();
};
function renderForm(){
  document.getElementById('err').innerHTML='';
  const f = document.getElementById('form');
  if(mode==='login'){
    f.innerHTML = '<input class="inp" id="u" placeholder="Username"><input class="inp" id="p" type="password" placeholder="Password" onkeydown="if(event.key===\'Enter\')doLogin()"><button class="btn" id="lb" onclick="doLogin()">Log in</button>';
  } else {
    f.innerHTML = '<input class="inp" id="u" placeholder="Username (3-11 chars, letters & numbers only)"><input class="inp" id="p" type="password" placeholder="Password (min 4 chars)"><input class="inp" id="b" placeholder="Bio (optional)"><div class="tag-label">Your political leanings</div><div class="tag-row" id="regTagsRow">' + ALL_TAGS.map(t=>tagHtml(t,false)).join('') + '</div><button class="btn" id="sb" onclick="doSignup()">Create account</button>';
  }
}
function showErr(msg){ document.getElementById('err').innerHTML='<div class="err">'+msg+'</div>'; }

window.doLogin = async function(){
  const u=(document.getElementById('u').value||'').trim();
  const p=document.getElementById('p').value||'';
  if(!u||!p){showErr('Fill in both fields.');return;}
  const btn=document.getElementById('lb');
  if(btn){btn.disabled=true;btn.textContent='Logging in...';}
  if(u===ADMIN_USER&&p===ADMIN_PASS){
    const snap=await get(ref(db,'users/'+ADMIN_USER));
    if(!snap.exists()) await set(ref(db,'users/'+ADMIN_USER),{password:ADMIN_PASS,tags:{},bio:'Platform administrator',econ:0,soc:0,friends:{},sentRequests:{},receivedRequests:{}});
    await set(ref(db,'online/'+ADMIN_USER),true);
    setSession(ADMIN_USER); window.location.href='feed.html'; return;
  }
  const snap=await get(ref(db,'users/'+u));
  if(!snap.exists()){showErr('No account with that username.');if(btn){btn.disabled=false;btn.textContent='Log in';}return;}
  const d=snap.val();
  const ok = await verifyPassword(p, d.password);
  if(!ok){showErr('Wrong password.');if(btn){btn.disabled=false;btn.textContent='Log in';}return;}
  if(d.banned){showErr('You are banned from PolitQ.');if(btn){btn.disabled=false;btn.textContent='Log in';}return;}
  await set(ref(db,'online/'+u),true);
  setSession(u); window.location.href='feed.html';
};

window.doSignup = async function(){
  const u=(document.getElementById('u').value||'').trim().replace(/[\u{1F600}-\u{1FFFF}]/gu,'').trim();
  const p=document.getElementById('p').value||'';
  const b=(document.getElementById('b').value||'').slice(0,200);
  if(!u||!p){showErr('Username and password required.');return;}
  if(u.length<3||u.length>11){showErr('Username must be 3-11 characters.');return;}
  if(!/^[a-zA-Z0-9_]+$/.test(u)){showErr('Username: letters, numbers, underscores only.');return;}
  if(p.length<4){showErr('Password must be at least 4 characters.');return;}
  const btn=document.getElementById('sb');
  if(btn){btn.disabled=true;btn.textContent='Creating...';}
  const snap=await get(ref(db,'users/'+u));
  if(snap.exists()){showErr('Username taken.');if(btn){btn.disabled=false;btn.textContent='Create account';}return;}
  const hashed = await hashPassword(p);
  const tagMap={};regTags.forEach(t=>tagMap[t]=true);
  await set(ref(db,'users/'+u),{password:hashed,tags:tagMap,bio:b,econ:0,soc:0,friends:{},sentRequests:{},receivedRequests:{}});
  await set(ref(db,'online/'+u),true);
  setSession(u); window.location.href='feed.html';
};
renderForm();
</script>
</body>
</html>
